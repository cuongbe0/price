<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE CRYPTO DASHBOARD</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:#0b0e11;
  color:#fff;
  font-family:Arial,sans-serif;
  padding:10px;
}

h1{
  text-align:center;
  font-size:28px;
  margin:20px 0;
}

.container{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.card{
  background:#131722;
  border:1px solid #00ffd0;
  border-radius:18px;
  padding:20px;
  min-height:140px;

  display:flex;
  flex-direction:column;
  justify-content:center;
}

.label{
  font-size:20px;
  margin-bottom:15px;
  opacity:.95;
}

.price{
  font-size:58px;
  font-weight:700;
  line-height:1;
  margin-bottom:12px;

  display:flex;
  justify-content:center;
  align-items:center;

  text-align:center;
}

.vnd{
  text-align:center;
  color:#bdbdbd;
  font-size:24px;
}

.green{
  color:#0ecb81;
}

.red{
  color:#f6465d;
}

@media(max-width:768px){

  h1{
    font-size:20px;
  }

  .card{
    min-height:120px;
    padding:18px;
  }

  .label{
    font-size:18px;
  }

  .price{
    font-size:42px;
  }

  .vnd{
    font-size:20px;
  }

}

</style>
</head>

<body>

<h1>🚀 LIVE CRYPTO DASHBOARD</h1>

<div class="container">

  <div class="card">
    <div class="label">🚀 TURBO</div>
    <div id="turbo" class="price">...</div>
    <div id="turbo_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">💎 PNIC</div>
    <div id="pnic" class="price">...</div>
    <div id="pnic_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🟠 BTC</div>
    <div id="btc" class="price">...</div>
    <div id="btc_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">Ξ ETH</div>
    <div id="eth" class="price">...</div>
    <div id="eth_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🟢 AVAX</div>
    <div id="avax" class="price">...</div>
    <div id="avax_vnd" class="vnd"></div>
  </div>

</div>

<script>

const API_KEY = 'sb_publishable__EFtt8r3kAP6zwWT0Ze38w_zktfLWuv';

let RATE = 25000;
let oldPrice = {};

async function loadRate(){

  try{

    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();

    RATE = data.rates.VND;

  }catch(e){

    console.log('rate error');

  }

}

async function loadTokens(){

  try{

    const res = await fetch(
      'https://mqeejpeekuzzygwabmnh.supabase.co/rest/v1/price_snapshots?select=*&order=timestamp.desc&limit=1',
      {
        headers:{
          apikey: API_KEY,
          Authorization:'Bearer ' + API_KEY
        }
      }
    );

    const data = await res.json();

    if(!data || !data.length) return;

    const item = data[0];

    updatePrice('turbo', item.turbo_price_usd);
    updatePrice('pnic', item.pnic_price_usd);

  }catch(e){

    console.log('token error', e);

  }

}

async function loadMarket(){

  try{

    const res = await fetch(
      'https://api.coincap.io/v2/assets'
    );

    const json = await res.json();

    const assets = json.data;

    const btc = assets.find(x => x.symbol === 'BTC');
    const eth = assets.find(x => x.symbol === 'ETH');
    const avax = assets.find(x => x.symbol === 'AVAX');

    updatePrice('btc', btc.priceUsd);
    updatePrice('eth', eth.priceUsd);
    updatePrice('avax', avax.priceUsd);

  }catch(e){

    console.log('market error');

  }

}

function updatePrice(id,value){

  const el = document.getElementById(id);
  const elVnd = document.getElementById(id + '_vnd');

  if(!el || !elVnd) return;

  const v = Number(value);

  if(isNaN(v)) return;

  el.innerText = '$' + v.toFixed(6);

  elVnd.innerText =
    (v * RATE).toLocaleString('vi-VN') + ' đ';

  if(oldPrice[id]){

    el.classList.remove('green');
    el.classList.remove('red');

    if(v > oldPrice[id]){
      el.classList.add('green');
    }

    if(v < oldPrice[id]){
      el.classList.add('red');
    }

  }

  oldPrice[id] = v;

}

loadRate();
loadTokens();
loadMarket();

setInterval(loadRate,60000);
setInterval(loadTokens,3000);
setInterval(loadMarket,5000);

</script>

</body>
</html>
