<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miracle Ecosystem Dashboard Live</title>
<style>
  body{background:#0b0e11; color:#fff; font-family:Arial; text-align:center; margin:0;}
  h2{font-size:22px; margin:20px 0; color:#00ffcc;}
  .row{display:flex; gap:12px; overflow-x:auto; padding:15px; justify-content:center; flex-wrap:wrap;}
  .card{min-width:160px; border:1px solid #2b3139; border-radius:12px; padding:20px; background:#161a1e;}
  .label{font-size:12px; color:#848e9c; text-transform:uppercase; letter-spacing:1px;}
  .price{font-size:24px; font-weight:bold; margin-top:8px;}
  .vnd{color:#aaa; font-size:13px; margin-top:5px;}
</style>
</head>
<body>

<h2>🚀 MIRACLE ECOSYSTEM LIVE</h2>

<div class="row">
  <div class="card">
    <div class="label">🌐 MIRX</div>
    <div id="mirx" class="price">...</div>
    <div id="mirx_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🚀 TURBO</div>
    <div id="turbo" class="price">...</div>
    <div id="turbo_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">💎 PNIC</div>
    <div id="pnic" class="price">...</div>
    <div id="pnic_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">📊 LP STAKED</div>
    <div id="staked" class="price">...</div>
    <div class="vnd">LP TOKENS</div>
  </div>

  <div class="card">
    <div class="label">🟠 BTC</div>
    <div id="btc" class="price">...</div>
    <div id="btc_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">Ξ ETH</div>
    <div id="eth" class="price">...</div>
    <div id="eth_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🟢 AVAX</div>
    <div id="avax" class="price">...</div>
    <div id="avax_vnd" class="vnd"></div>
  </div>
</div>

<script>
let rate = 25400; // Tỷ giá dự phòng

// 1. Tự động lấy tỷ giá VND
async function loadRate(){
  try{
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json(); rate = data.rates.VND;
  }catch(e){}
}

// 2. Lấy dữ liệu MIRX, PNIC từ sàn Miracle DEX
async function loadMiraclePrices(){
  try{
    const res = await fetch("https://api.miracledex.net/api/v1/tokens/prices");
    const data = await res.json();
    renderPrice("mirx", data.MIRX);
    renderPrice("pnic", data.PNIC);
  }catch(e){
    console.log("Lỗi tải giá sàn MIRX");
  }
}

// 3. Lấy dữ liệu TURBO & STAKED từ API staking
async function loadTurboStats(){
  try{
    const res = await fetch("https://api.miracledex.net/api/v1/turbo/stats");
    const data = await res.json();
    renderPrice("turbo", data.price);
    // Chỉ lấy con số nguyên của STAKED giống ông yêu cầu
    document.getElementById("staked").innerText = Math.floor(data.staked).toLocaleString("vi-VN");
  }catch(e){
    console.log("Lỗi tải LP Staked");
  }
}

// 4. Lấy giá quốc tế (BTC, ETH, AVAX)
async function loadMarketPrices(){
  try{
    const res = await fetch("https://min-api.cryptocompare.com/data/pricemulti?fsyms=BTC,ETH,AVAX&tsyms=USD");
    const data = await res.json();
    renderPrice("btc", data.BTC.USD);
    renderPrice("eth", data.ETH.USD);
    renderPrice("avax", data.AVAX.USD);
  }catch(e){
    console.log("Lỗi tải giá thị trường");
  }
}

function renderPrice(id, val){
  const el = document.getElementById(id);
  const elV = document.getElementById(id+"_vnd");
  const v = Number(val);
  if(!v || !el) return;
  
  el.innerText = "$" + (v < 1 ? v.toFixed(6) : v.toLocaleString("en-US"));
  if(elV) elV.innerText = Math.round(v * rate).toLocaleString("vi-VN") + " đ";
}

// === RUN ===
loadRate();
setInterval(loadRate, 60000);

loadMiraclePrices();
loadTurboStats();
loadMarketPrices();

setInterval(loadMiraclePrices, 5000); // Cập nhật mỗi 5 giây
setInterval(loadTurboStats, 5000);
setInterval(loadMarketPrices, 3000);
</script>

</body>
</html>
