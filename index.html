<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Dashboard</title>

<style>
body{
  background:#0b0e11;
  color:#fff;
  font-family:Arial;
  text-align:center;
  margin:0;
}

h2{
  font-size:22px;
  margin:20px 0;
}

.row{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:15px;
}

.row::-webkit-scrollbar{
  height:6px;
}

.row::-webkit-scrollbar-thumb{
  background:#00ffcc;
  border-radius:10px;
}

.card{
  min-width:170px;
  flex:0 0 auto;
  border:1px solid #00ffcc;
  border-radius:14px;
  padding:20px;
  background:#11151c;
}

.label{
  font-size:16px;
}

.price{
  font-size:26px;
  font-weight:bold;
  margin-top:10px;
}

.vnd{
  color:#aaa;
  font-size:16px;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>🚀 LIVE CRYPTO DASHBOARD</h2>

<div class="row">

  <div class="card">
    <div class="label">🚀 TURBO</div>
    <div id="turbo" class="price">...</div>
    <div id="turbo_vnd" class="vnd"></div>
  </div>
</html>
