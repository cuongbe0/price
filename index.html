<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Miracle Dashboard Auto</title>
    <style>
        body{background:#0b0e11; color:#fff; font-family:sans-serif; text-align:center; margin:0; padding:20px;}
        .row{display:flex; gap:10px; justify-content:center; flex-wrap:wrap; margin-bottom:15px;}
        .card{border:1px solid #2b3139; border-radius:12px; padding:15px; background:#161a1e; min-width:140px;}
        .price{font-size:22px; font-weight:bold; color:#00ffcc; margin-top:5px;}
        .label{color:#848e9c; font-size:11px; text-transform:uppercase; letter-spacing:1px;}
    </style>
</head>
<body>
    <h2 style="color:#00ffcc; margin-bottom:20px;">🚀 MIRACLE LIVE AUTO</h2>
    
    <div class="row">
        <div class="card"><div class="label">🌐 MIRX</div><div id="mirx" class="price">--</div></div>
        <div class="card"><div class="label">🚀 TURBO</div><div id="turbo" class="price">--</div></div>
        <div class="card"><div class="label">💎 PNIC</div><div id="pnic" class="price">--</div></div>
        <div class="card"><div class="label">📊 STAKED</div><div id="lp" class="price">--</div></div>
    </div>

    <div class="row">
        <div class="card"><div class="label">🟠 BTC</div><div id="btc" class="price">--</div></div>
        <div class="card"><div class="label">Ξ ETH</div><div id="eth" class="price">--</div></div>
        <div class="card"><div class="label">🟢 AVAX</div><div id="avax" class="price">--</div></div>
    </div>

    <script>
        async function update() {
            // 1. Lấy giá MIRX & PNIC từ Dex nội bộ
            try {
                const r = await fetch("https://api.miracledex.net/api/v1/tokens/prices");
                const d = await r.json();
                // Giả định API trả về object, chỉnh lại theo đúng thực tế sàn
                document.getElementById("mirx").innerText = "$" + (d.MIRX || 3.2624).toFixed(4);
                document.getElementById("pnic").innerText = "$" + (d.PNIC || 0.0034).toFixed(4);
            } catch (e) {
                // Nếu lỗi API sàn, dùng giá fix cứng để chống trắng trang
                document.getElementById("mirx").innerText = "$3.2624";
                document.getElementById("pnic").innerText = "$0.0034";
            }

            // 2. Lấy giá TURBO & STAKED
            try {
                const rT = await fetch("https://api.miracledex.net/api/v1/turbo/stats");
                const t = await rT.json();
                document.getElementById("turbo").innerText = "$" + (t.price || 0.0733).toFixed(4);
                document.getElementById("lp").innerText = (t.staked || 12536338).toLocaleString();
            } catch (e) {
                document.getElementById("turbo").innerText = "$0.0733";
                document.getElementById("lp").innerText = "12,536,338";
            }

            // 3. Lấy giá quốc tế (BTC, ETH, AVAX) - Giống hệt price2
            try {
                const rM = await fetch("https://min-api.cryptocompare.com/data/pricemulti?fsyms=BTC,ETH,AVAX&tsyms=USD");
                const m = await rM.json();
                document.getElementById("btc").innerText = "$" + m.BTC.USD.toLocaleString();
                document.getElementById("eth").innerText = "$" + m.ETH.USD.toLocaleString();
                document.getElementById("avax").innerText = "$" + m.AVAX.USD.toFixed(2);
            } catch (e) {}
        }

        update();
        setInterval(update, 5000);
    </script>
</body>
</html>
