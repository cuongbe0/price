<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE CRYPTO DASHBOARD</title>

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#05070d;
  font-family:Arial,sans-serif;
  color:#fff;
  padding:10px;
  overflow:hidden;
}

h1{
  text-align:center;
  font-size:30px;
  margin-bottom:12px;
  font-weight:900;
}

.container{
  display:flex;
  flex-direction:column;
  gap:10px;
  height:calc(100vh - 70px);
}

.card{
  flex:1;
  background:#0f1525;
  border:1px solid #00ffd0;
  border-radius:18px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;

  text-align:center;

  box-shadow:0 0 15px rgba(0,255,208,0.08);
}

.label{
  font-size:22px;
  margin-bottom:10px;
  font-weight:bold;
}

.price{
  font-size:clamp(34px,6vw,58px);
  font-weight:900;
  line-height:1;
}

.vnd{
  margin-top:10px;
  color:#aaa;
  font-size:22px;
}

.green{
  color:#00ff9d;
}

.red{
  color:#ff4d6d;
}

/* mobile */

@media(max-width:768px){

  h1{
    font-size:22px;
    margin-bottom:8px;
  }

  .container{
    gap:8px;
    height:calc(100vh - 55px);
  }

  .label{
    font-size:18px;
    margin-bottom:8px;
  }

  .price{
    font-size:48px;
  }

  .vnd{
    font-size:18px;
    margin-top:8px;
  }

}

</style>
</head>

<body>

<h1>🚀 LIVE CRYPTO DASHBOARD</h1>

<div class="container">

  <div class="card">
    <div class="label">🚀 TURBO</div>
    <div id="turbo" class="price">...</div>
    <div id="turbo_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">💎 PNIC</div>
    <div id="pnic" class="price">...</div>
    <div id="pnic_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🟠 BTC</div>
    <div id="btc" class="price">...</div>
    <div id="btc_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">Ξ ETH</div>
    <div id="eth" class="price">...</div>
    <div id="eth_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🟢 AVAX</div>
    <div id="avax" class="price">...</div>
    <div id="avax_vnd" class="vnd"></div>
  </div>

</div>

<script>

const API_KEY = 'sb_publishable__EFtt8r3kAP6zwWT0Ze38w_zktfLWuv';

let RATE = 26000;
let oldPrice = {};

async function loadRate(){

  try{

    const res = await fetch('https://open.er-api.com/v6/latest/USD');
    const data = await res.json();

    RATE = data.rates.VND;

  }catch(e){
    console.log('rate error');
  }
}

function updatePrice(id, value){

  const el = document.getElementById(id);
  const elVnd = document.getElementById(id + '_vnd');

  if(!el || !elVnd) return;

  const v = Number(value);

  if(isNaN(v)) return;

  el.innerHTML = '$' + v.toLocaleString('en-US',{
    minimumFractionDigits: 6,
    maximumFractionDigits: 6
  });

  elVnd.innerHTML =
    (v * RATE).toLocaleString('vi-VN') + ' đ';

  if(oldPrice[id]){

    el.classList.remove('green');
    el.classList.remove('red');

    if(v > oldPrice[id]){
      el.classList.add('green');
    }

    if(v < oldPrice[id]){
      el.classList.add('red');
    }

  }

  oldPrice[id] = v;
}

async function loadTurbo(){

  try{

    const res = await fetch(
      'https://mqeejpeekuzzygwabmnh.supabase.co/rest/v1/price_snapshots?select=*&order=timestamp.desc&limit=1',
      {
        headers:{
          apikey: API_KEY,
          Authorization: 'Bearer ' + API_KEY
        }
      }
    );

    const data = await res.json();

    if(!data || !data.length) return;

    const item = data[0];

    updatePrice('turbo', item.turbo_price_usd);
    updatePrice('pnic', item.pnic_price_usd);

  }catch(e){

    console.log('turbo error');

  }

}

async function loadMarket(){

  try{

    // dùng Binance API nhanh hơn CoinGecko

    const symbols = [
      'BTCUSDT',
      'ETHUSDT',
      'AVAXUSDT'
    ];

    const results = await Promise.all(

      symbols.map(s =>
        fetch(
          'https://api.binance.com/api/v3/ticker/price?symbol=' + s
        ).then(r => r.json())
      )

    );

    updatePrice('btc', results[0].price);
    updatePrice('eth', results[1].price);
    updatePrice('avax', results[2].price);

  }catch(e){

    console.log('market error');

  }

}

async function start(){

  await loadRate();

  loadTurbo();
  loadMarket();

  setInterval(loadTurbo,3000);
  setInterval(loadMarket,3000);
  setInterval(loadRate,60000);

}

start();

</script>

</body>
</html>
