<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Dashboard Realtime</title>
    <style>
        body{background:#0b0e11; color:#fff; font-family:Arial, sans-serif; text-align:center; margin:0; padding-bottom:50px;}
        h2{font-size:22px; margin:20px 0; color:#00ffcc;}
        .section-title{font-size:12px; color:#666; text-align:left; margin:10px 0 0 20px; text-transform:uppercase; letter-spacing:2px;}
        .row{display:flex; gap:12px; overflow-x:auto; padding:15px; margin-bottom:10px;}
        .row::-webkit-scrollbar{height:4px;}
        .row::-webkit-scrollbar-thumb{background:#333; border-radius:10px;}
        .card{min-width:160px; flex:1; border:1px solid #1e2329; border-radius:12px; padding:18px; background:#161a1e;}
        .label{font-size:14px; color:#848e9c; margin-bottom:8px;}
        .price{font-size:24px; font-weight:bold; color:#eaecef;}
        .vnd{color:#00ffcc; font-size:14px; margin-top:4px; font-weight:bold;}
    </style>
</head>
<body>

    <h2>🚀 LIVE CRYPTO DASHBOARD</h2>

    <div class="section-title">Hệ Sinh Thái</div>
    <div class="row">
        <div class="card"><div class="label">🌐 MIRX</div><div id="mirx" class="price">--</div><div id="mirx_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">🚀 TURBO</div><div id="turbo" class="price">--</div><div id="turbo_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">💎 PNIC</div><div id="pnic" class="price">--</div><div id="pnic_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">🧪 LP</div><div id="lp" class="price">--</div><div id="lp_vnd" class="vnd"></div></div>
    </div>

    <div class="section-title">Thị Trường Quốc Tế</div>
    <div class="row">
        <div class="card"><div class="label">🟠 BTC</div><div id="btc" class="price">--</div><div id="btc_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">Ξ ETH</div><div id="eth" class="price">--</div><div id="eth_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">🟢 AVAX</div><div id="avax" class="price">--</div><div id="avax_vnd" class="vnd"></div></div>
    </div>

    <script>
        const API_KEY = "sb_publishable__EFtt8r3kAP6zwWT0Ze38w_zktfLWuv";
        // Tỷ giá khớp với sàn Miracle DEX (~27.030)
        let RATE = 27032; 
        let oldPrices = {};

        async function init() {
            refreshAll();
            // Cập nhật 2 giây/lần để tránh bị đơ trình duyệt
            setInterval(refreshAll, 2000);
        }

        async function refreshAll() {
            // 1. Lấy dữ liệu hệ sinh thái từ Supabase
            try {
                const res = await fetch(`https://mqeejpeekuzzygwabmnh.supabase.co/rest/v1/price_snapshots?select=*&order=timestamp.desc&limit=1`, {
                    headers: { "apikey": API_KEY, "Authorization": "Bearer " + API_KEY }
                });
                const data = await res.json();
                if (data && data[0]) {
                    const item = data[0];
                    // Tìm đúng giá MIRX (thử các cột phổ biến)
                    const mirxPrice = item.mirx_price_usd || item.mirx_price || item.mirx_usd || 3.269680;
                    
                    updateUI("mirx", mirxPrice);
                    updateUI("turbo", item.turbo_price_usd);
                    updateUI("pnic", item.pnic_price_usd);
                    updateUI("lp", item.lp_price_usd);
                }
            } catch (e) { console.error("Supabase Error"); }

            // 2. Lấy dữ liệu quốc tế từ nguồn ổn định
            try {
                const resMarket = await fetch("https://min-api.cryptocompare.com/data/pricemulti?fsyms=BTC,ETH,AVAX&tsyms=USD");
                const marketData = await resMarket.json();
                if(marketData.BTC) updateUI("btc", marketData.BTC.USD);
                if(marketData.ETH) updateUI("eth", marketData.ETH.USD);
                if(marketData.AVAX) updateUI("avax", marketData.AVAX.USD);
            } catch (e) { console.error("Market Error"); }
        }

        function updateUI(id, val) {
            if (val === undefined || val === null) return;
            const el = document.getElementById(id);
            const elVnd = document.getElementById(id + "_vnd");
            if (!el) return;

            const price = parseFloat(val);
            // Hiển thị 6 số lẻ cho chính xác như sàn MIRX
            const formattedUsd = price >= 1000 ? price.toLocaleString('en-US', {minimumFractionDigits: 2}) : price.toFixed(6);
            
            el.innerText = `$${formattedUsd}`;
            
            if(elVnd) {
                const vndValue = Math.round(price * RATE).toLocaleString("vi-VN");
                elVnd.innerText = `${vndValue} VND`;
            }

            // Đổi màu khi có biến động giá
            if (oldPrices[id] && price !== oldPrices[id]) {
                el.style.color = price > oldPrices[id] ? "#0ecb81" : "#f6465d";
                setTimeout(() => { el.style.color = "#eaecef"; }, 800);
            }
            oldPrices[id] = price;
        }

        init();
    </script>
</body>
</html>
