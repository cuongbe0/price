<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Dashboard</title>
<style>
  body{background:#0b0e11; color:#fff; font-family:Arial; text-align:center; margin:0;}
  h2{font-size:22px; margin:20px 0; color:#00ffcc;}
  .row{display:flex; gap:15px; overflow-x:auto; padding:15px; justify-content:center; flex-wrap:wrap;}
  .card{min-width:170px; flex:0 0 auto; border:1px solid #00ffcc; border-radius:14px; padding:20px; background:#161a1e;}
  .label{font-size:16px; color:#848e9c;}
  .price{font-size:26px; font-weight:bold; margin-top:10px;}
  .vnd{color:#aaa; font-size:16px;}
</style>
</head>
<body>

<h2>🚀 LIVE CRYPTO DASHBOARD</h2>

<div class="row">
  <div class="card">
    <div class="label">📊 TOTAL STAKED</div>
    <div id="staked" class="price">...</div>
    <div class="vnd">LP TOKENS</div>
  </div>

  <div class="card">
    <div class="label">🚀 TURBO</div>
    <div id="turbo" class="price">...</div>
    <div id="turbo_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">💎 PNIC</div>
    <div id="pnic" class="price">...</div>
    <div id="pnic_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🟠 BTC</div>
    <div id="btc" class="price">...</div>
    <div id="btc_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">Ξ ETH</div>
    <div id="eth" class="price">...</div>
    <div id="eth_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🟢 AVAX</div>
    <div id="avax" class="price">...</div>
    <div id="avax_vnd" class="vnd"></div>
  </div>
</div>

<script>
let RATE = 25400;

async function loadData(){
  try{
    // 1. Lấy tỷ giá VND mới nhất
    const resRate = await fetch("https://open.er-api.com/v6/latest/USD");
    const dataRate = await resRate.json();
    RATE = dataRate.rates.VND;

    // 2. Lấy dữ liệu từ API sàn Miracle (Giống price2)
    // Lấy Total Staked và giá Turbo
    const resTurbo = await fetch("https://api.miracledex.net/api/v1/turbo/stats");
    const dataTurbo = await resTurbo.json();
    
    // Hiển thị Total Staked (Số nguyên, định dạng 12.345.678)
    document.getElementById("staked").innerText = Math.floor(dataTurbo.staked).toLocaleString("vi-VN");
    updateUI("turbo", dataTurbo.price);

    // Lấy giá PNIC
    const resPnic = await fetch("https://api.miracledex.net/api/v1/tokens/prices");
    const dataPnic = await resPnic.json();
    updateUI("pnic", dataPnic.PNIC);

    // 3. Lấy giá BTC, ETH, AVAX từ Coingecko
    const resM = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,avalanche-2&vs_currencies=usd");
    const dataM = await resM.json();
    updateUI("btc", dataM.bitcoin.usd);
    updateUI("eth", dataM.ethereum.usd);
    updateUI("avax", dataM["avalanche-2"].usd);

  }catch(e){ console.log("Lỗi tải dữ liệu: ", e); }
}

function updateUI(id, val){
  const el = document.getElementById(id);
  const elVnd = document.getElementById(id+"_vnd");
  if(!el || !val) return;
  
  const v = Number(val);
  el.innerText = "$" + (v < 1 ? v.toFixed(6) : v.toLocaleString());
  if(elVnd) elVnd.innerText = Math.round(v * RATE).toLocaleString("vi-VN") + " đ";
}

loadData();
setInterval(loadData, 10000); // Cập nhật mỗi 10 giây
</script>

</body>
</html>
