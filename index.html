# File index.html hoàn chỉnh

```html
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Crypto Dashboard</title>

<style>
body{
  background:#0b0e11;
  color:#fff;
  font-family:Arial;
  text-align:center;
  margin:0;
}

h2{
  font-size:22px;
  margin:20px 0;
}

.row{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding:15px;
}

.row::-webkit-scrollbar{
  height:6px;
}

.row::-webkit-scrollbar-thumb{
  background:#00ffcc;
  border-radius:10px;
}

.card{
  min-width:170px;
  flex:0 0 auto;
  border:1px solid #00ffcc;
  border-radius:14px;
  padding:20px;
  background:#11151c;
}

.label{
  font-size:16px;
}

.price{
  font-size:26px;
  font-weight:bold;
  margin-top:10px;
}

.vnd{
  color:#aaa;
  font-size:16px;
  margin-top:5px;
}
</style>
</head>

<body>

<h2>🚀 LIVE CRYPTO DASHBOARD</h2>

<div class="row">

  <div class="card">
    <div class="label">🚀 TURBO</div>
    <div id="turbo" class="price">...</div>
    <div id="turbo_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">💎 PNIC</div>
    <div id="pnic" class="price">...</div>
    <div id="pnic_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🏦 Total Staked</div>
    <div id="staked" class="price">...</div>
    <div id="staked_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">⏳ Time Left</div>
    <div id="timeleft" class="price">...</div>
    <div class="vnd">Remaining</div>
  </div>

  <div class="card">
    <div class="label">🟠 BTC</div>
    <div id="btc" class="price">...</div>
    <div id="btc_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">Ξ ETH</div>
    <div id="eth" class="price">...</div>
    <div id="eth_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🟢 AVAX</div>
    <div id="avax" class="price">...</div>
    <div id="avax_vnd" class="vnd"></div>
  </div>

</div>

<script>

const API_KEY = "sb_publishable__EFtt8r3kAP6zwWT0Ze38w_zktfLWuv";

let RATE = 25000;
let old = {};

async function loadRate(){
  try{
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();
    RATE = data.rates.VND;
  }catch(e){}
}

async function loadTokens(){
  try{
    const res = await fetch(
      "https://mqeejpeekuzzygwabmnh.supabase.co/rest/v1/price_snapshots?select=turbo_price_usd,pnic_price_usd,total_staked,time_left&order=timestamp.desc&limit=1",
      {
        headers:{
          "apikey": API_KEY,
          "Authorization": "Bearer " + API_KEY
        }
      }
    );

    const data = await res.json();
    if(!data.length) return;

    update("turbo", data[0].turbo_price_usd);
    update("pnic", data[0].pnic_price_usd);

    updateStaked(data[0].total_staked);
    updateTime(data[0].time_left);

  }catch(e){
    console.log("Token lỗi");
  }
}

async function loadMarket(){
  try{
    const res = await fetch(
      "https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum,avalanche-2&vs_currencies=usd"
    );

    const data = await res.json();

    update("btc", data.bitcoin.usd);
    update("eth", data.ethereum.usd);
    update("avax", data["avalanche-2"].usd);

  }catch(e){
    console.log("Market lỗi");
  }
}

function update(id, value){
  const el = document.getElementById(id);
  const elVnd = document.getElementById(id+"_vnd");

  const v = Number(value);
  if(!v) return;

  const vnd = v * RATE;

  el.innerText = "$" + v.toFixed(6);
  elVnd.innerText = vnd.toLocaleString("vi-VN") + " đ";

  if(old[id]){
    if(v > old[id]) el.style.color = "#0ecb81";
    else if(v < old[id]) el.style.color = "#f6465d";
  }

  old[id] = v;
}

function updateStaked(value){
  const el = document.getElementById("staked");
  const elVnd = document.getElementById("staked_vnd");

  const v = Number(value);
  if(!v) return;

  el.innerText = Number(v).toLocaleString("en-US");

  const usd = v * 0.0347;

  elVnd.innerText = "~$" + usd.toLocaleString("en-US", {
    maximumFractionDigits:0
  });
}

function updateTime(value){
  const el = document.getElementById("timeleft");

  if(!value) return;

  el.innerText = value;
}

loadRate();
setInterval(loadRate,60000);

setInterval(loadTokens,2000);
setInterval(loadMarket,3000);

loadTokens();
loadMarket();

</script>

</body>
</html>
```
