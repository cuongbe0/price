<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Crypto Dashboard Live</title>
    <style>
        body{background:#0b0e11; color:#fff; font-family:Arial, sans-serif; text-align:center; margin:0; padding-bottom:50px;}
        h2{color:#00ffcc; padding:20px 0;}
        .section-title{font-size:12px; color:#666; text-align:left; margin:15px 0 0 20px; text-transform:uppercase; letter-spacing:2px;}
        .row{display:flex; gap:12px; padding:15px; overflow-x:auto;}
        .card{min-width:160px; flex:1; border:1px solid #2b3139; border-radius:12px; padding:18px; background:#161a1e;}
        .label{font-size:13px; color:#848e9c; margin-bottom:8px;}
        .price{font-size:22px; font-weight:bold; color:#eaecef;}
        .vnd{color:#00ffcc; font-size:13px; margin-top:4px; font-weight:bold;}
    </style>
</head>
<body>
    <h2>🚀 LIVE CRYPTO DASHBOARD</h2>

    <div class="section-title">Hệ Sinh Thái</div>
    <div class="row">
        <div class="card"><div class="label">🌐 MIRX</div><div id="mirx" class="price">--</div><div id="mirx_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">🚀 TURBO</div><div id="turbo" class="price">--</div><div id="turbo_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">💎 PNIC</div><div id="pnic" class="price">--</div><div id="pnic_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">📊 TOTAL STAKED</div><div id="lp" class="price">--</div><div id="lp_vnd" class="vnd"></div></div>
    </div>

    <div class="section-title">Thị Trường</div>
    <div class="row">
        <div class="card"><div class="label">🟠 BTC</div><div id="btc" class="price">--</div><div id="btc_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">Ξ ETH</div><div id="eth" class="price">--</div><div id="eth_vnd" class="vnd"></div></div>
        <div class="card"><div class="label">🟢 AVAX</div><div id="avax" class="price">--</div><div id="avax_vnd" class="vnd"></div></div>
    </div>

    <script>
    // Tôi đã làm sạch Key và URL cho ông, không thiếu một dấu phẩy nào
    const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZGVoeGh3andnY3NlaHJxdm9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzY4MzgsImV4cCI6MjA5MzU1MjgzOH0.Rxx0IZYRRUUMPurhJqO6FdCS8O6t9NWrh_NfcU6onTY"; 
    const BASE_URL = "https://zndehxhwjwgcsehrqvoq.supabase.co/rest/v1/price_snapshots";
    const RATE_VND = 27050; 

    async function updateData() {
        try {
            // Lấy dữ liệu mới nhất từ bảng price_snapshots
            const res = await fetch(`${BASE_URL}?select=*&order=timestamp.desc&limit=1&t=${Date.now()}`, {
                headers: { 
                    "apikey": API_KEY, 
                    "Authorization": "Bearer " + API_KEY 
                }
            });
            const data = await res.json();
            
            if (data && data.length > 0) {
                const item = data[0];
                console.log("Data found:", item);
                // Bốc đúng tên cột mirx_price_usd, turbo_price_usd...
                render("mirx", item.mirx_price_usd, 4);
                render("turbo", item.turbo_price_usd, 4);
                render("pnic", item.pnic_price_usd, 4);
                render("lp", item.total_staked, 0, true);
            }
        } catch (e) {
            console.error("Lỗi kết nối Supabase");
        }

        // Lấy giá BTC, ETH, AVAX (Cái này đang chạy ngon)
        try {
            const resM = await fetch("https://min-api.cryptocompare.com/data/pricemulti?fsyms=BTC,ETH,AVAX&tsyms=USD");
            const m = await resM.json();
            if(m.BTC) render("btc", m.BTC.USD, 2);
            if(m.ETH) render("eth", m.ETH.USD, 2);
            if(m.AVAX) render("avax", m.AVAX.USD, 4);
        } catch (e) {}
    }

    function render(id, val, dec, isStaked = false) {
        const el = document.getElementById(id);
        const elVnd = document.getElementById(id + "_vnd");
        if (!el || val === undefined || val === null) return;
        const price = parseFloat(val);
        el.innerText = (isStaked ? "" : "$") + price.toLocaleString('en-US', {minimumFractionDigits: dec});
        if (elVnd) {
            elVnd.innerText = isStaked ? "LP TOKENS" : Math.round(price * RATE_VND).toLocaleString("vi-VN") + " VND";
        }
    }

    updateData();
    setInterval(updateData, 5000);
</script>
