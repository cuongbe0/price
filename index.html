<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LP STAKED PRO CHART</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *{margin:0; padding:0; box-sizing:border-box;}
        body{background:#050811; color:white; font-family:Arial,sans-serif; overflow:hidden;}
        .container{width:100%; height:100vh; padding:12px;}
        .topbar{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
        .left h1{font-size:28px; color: #848e9c;}
        .staked-value{color:#00ffcc; font-size:42px; font-weight:bold; margin-top:5px;}
        .indicators{display:flex; gap:10px; margin-top:8px;}
        .badge{background:#111827; padding:6px 12px; border-radius:10px; font-size:14px; border: 1px solid #2b3139;}
        .chart-wrap{width:100%; height:82vh; background:#0b1220; border-radius:18px; padding:10px; border: 1px solid #1e2329;}
        canvas{width:100% !important; height:100% !important;}
    </style>
</head>
<body>

<div class="container">
    <div class="topbar">
        <div class="left">
            <h1>TOTAL LP STAKED</h1>
            <div class="staked-value" id="stakedValue">Loading...</div>
            <div class="indicators">
                <div class="badge" id="ma7Box">MA7: --</div>
                <div class="badge" id="ma25Box">MA25: --</div>
                <div class="badge" id="trendBox">Trend: --</div>
            </div>
        </div>
    </div>
    <div class="chart-wrap">
        <canvas id="chart"></canvas>
    </div>
</div>

<script>
    // Dùng Key của dự án zndehxhw...
    const API_KEY = "sb_publishable__EFtt8r3kAP6zwWT0Ze38w_zktfLWuv";
    // Đổi API URL để lấy cột 'staked' thay vì 'turbo_price_usd'
    const API_URL = "https://zndehxhwjwgcsehrqvoq.supabase.co/rest/v1/price_snapshots?select=staked,timestamp&order=timestamp.desc&limit=1000";

    const ctx = document.getElementById("chart");

    function movingAverage(data, period){
        return data.map((_, index) => {
            if(index < period) return null;
            const slice = data.slice(index - period, index);
            return slice.reduce((a,b)=>a+b,0) / period;
        });
    }

    const chart = new Chart(ctx, {
        type:"line",
        data:{
            labels:[],
            datasets:[
                {
                    label:"LP STAKED",
                    data:[],
                    borderColor: "#00ffcc",
                    backgroundColor: "rgba(0, 255, 204, 0.1)",
                    borderWidth:3,
                    fill: true,
                    tension:0.3,
                    pointRadius:0
                },
                {
                    label:"MA7 (Ngắn hạn)",
                    data:[],
                    borderColor: "#ffd400",
                    borderWidth:1.5,
                    tension:0.2,
                    pointRadius:0,
                    borderDash: [5, 5]
                },
                {
                    label:"MA25 (Dài hạn)",
                    data:[],
                    borderColor: "#ff3e3e",
                    borderWidth:1.5,
                    tension:0.2,
                    pointRadius:0
                }
            ]
        },
        options:{
            responsive:true,
            maintainAspectRatio:false,
            animation:false,
            interaction:{ intersect:false, mode:'index' },
            plugins:{
                legend:{ labels:{ color:"#848e9c", font: { size: 12 } } }
            },
            scales:{
                x:{
                    ticks:{ color:"#5e6673", autoSkip:true, maxTicksLimit:8 },
                    grid:{ color:"rgba(255,255,255,0.02)" }
                },
                y:{
                    ticks:{ 
                        color:"#5e6673",
                        callback: function(value) {
                            return value.toLocaleString();
                        }
                    },
                    grid:{ color:"rgba(255,255,255,0.02)" }
                }
            }
        }
    });

    async function loadChart(){
        try{
            const response = await fetch(API_URL, {
                headers:{
                    "apikey":API_KEY,
                    "Authorization": "Bearer " + API_KEY
                }
            });
            const data = await response.json();
            data.reverse();

            const labels = data.map(item => {
                return new Date(item.timestamp).toLocaleString("vi-VN",{
                    day:"2-digit", month:"2-digit", hour:"2-digit", minute:"2-digit"
                });
            });

            const stakedValues = data.map(item => Number(item.staked || 0));

            const ma7 = movingAverage(stakedValues, 7);
            const ma25 = movingAverage(stakedValues, 25);

            chart.data.labels = labels;
            chart.data.datasets[0].data = stakedValues;
            chart.data.datasets[1].data = ma7;
            chart.data.datasets[2].data = ma25;
            chart.update();

            const latestStaked = stakedValues[stakedValues.length - 1];
            document.getElementById("stakedValue").innerText = latestStaked.toLocaleString();

            const lastMA7 = ma7[ma7.length - 1];
            const lastMA25 = ma25[ma25.length - 1];

            if(lastMA7) document.getElementById("ma7Box").innerText = "MA7: " + Math.floor(lastMA7).toLocaleString();
            if(lastMA25) document.getElementById("ma25Box").innerText = "MA25: " + Math.floor(lastMA25).toLocaleString();

            const trendBox = document.getElementById("trendBox");
            if(lastMA7 > lastMA25){
                trendBox.innerText = "Trend: ACCUMULATING"; // Đang tăng trưởng
                trendBox.style.color = "#00ffcc";
            }else{
                trendBox.innerText = "Trend: REDUCING"; // Đang giảm
                trendBox.style.color = "#ff3e3e";
            }
        }
        catch(error){
            console.log(error);
            document.getElementById("stakedValue").innerText = "API ERROR";
        }
    }

    loadChart();
    setInterval(loadChart, 10000); // 10 giây cập nhật 1 lần cho nhẹ
</script>
</body>
</html>
