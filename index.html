<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miracle Dashboard Live</title>
<style>
body{background:#0b0e11; color:#fff; font-family:Arial; text-align:center; margin:0;}
h2{font-size:22px; margin:20px 0; color:#00ffcc;}
.row{display:flex; gap:15px; overflow-x:auto; padding:15px; justify-content: center;}
.row::-webkit-scrollbar{height:6px;}
.row::-webkit-scrollbar-thumb{background:#00ffcc; border-radius:10px;}
.card{min-width:170px; flex:0 0 auto; border:1px solid #00ffcc; border-radius:14px; padding:20px; background: #161a1e;}
.label{font-size:14px; color: #848e9c; text-transform: uppercase;}
.price{font-size:24px; font-weight:bold; margin-top:10px; transition: color 0.3s;}
.vnd{color:#aaa; font-size:14px; margin-top: 5px;}
</style>
</head>
<body>

<h2>🚀 MIRACLE ECOSYSTEM LIVE</h2>

<div class="row">
  <div class="card">
    <div class="label">🚀 TURBO</div>
    <div id="turbo" class="price">...</div>
    <div id="turbo_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">💎 PNIC</div>
    <div id="pnic" class="price">...</div>
    <div id="pnic_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">📊 LP STAKED</div>
    <div id="staked" class="price">...</div>
    <div class="vnd">TOKENS</div>
  </div>

  <div class="card">
    <div class="label">🟠 BTC</div>
    <div id="btc" class="price">...</div>
    <div id="btc_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">Ξ ETH</div>
    <div id="eth" class="price">...</div>
    <div id="eth_vnd" class="vnd"></div>
  </div>

  <div class="card">
    <div class="label">🟢 AVAX</div>
    <div id="avax" class="price">...</div>
    <div id="avax_vnd" class="vnd"></div>
  </div>
</div>

<script>
const API_KEY = "sb_publishable__EFtt8r3kAP6zwWT0Ze38w_zktfLWuv";
const SUPABASE_URL = "https://zndehxhwjwgcsehrqvoq.supabase.co/rest/v1/price_snapshots";
let RATE = 25400;
let old = {};

async function loadRate(){
  try{
    const res = await fetch("https://open.er-api.com/v6/latest/USD");
    const data = await res.json();
    RATE = data.rates.VND;
  }catch(e){}
}

async function loadTokens(){
  try{
    const res = await fetch(
      `${SUPABASE_URL}?select=turbo,pnic,staked&order=timestamp.desc&limit=1`,
      { headers:{ "apikey": API_KEY, "Authorization": "Bearer " + API_KEY } }
    );
    const data = await res.json();
    if(!data || !data.length) return;

    const item = data[0];
    update("turbo", item.turbo, true);
    update("pnic", item.pnic, true);
    
    // Cập nhật STAKED
    const elS = document.getElementById("staked");
    const valS = Math.floor(item.staked || 0);
    elS.innerText = valS.toLocaleString();
    if(old["staked"] && valS > old["staked"]) elS.style.color = "#0ecb81";
    else if(old["staked"] && valS < old["staked"]) elS.style.color = "#f6465d";
    old["staked"] = valS;

  }catch(e){ console.log("Token lỗi"); }
}

async function loadMarket(){
  try{
    const res = await fetch("https://min-api.cryptocompare.com/data/pricemulti?fsyms=BTC,ETH,AVAX&tsyms=USD");
    const data = await res.json();
    update("btc", data.BTC.USD, true);
    update("eth", data.ETH.USD, true);
    update("avax", data.AVAX.USD, true);
  }catch(e){}
}

function update(id, value, isPrice){
  const el = document.getElementById(id);
  const elV = document.getElementById(id+"_vnd");
  const v = Number(value);
  if(!v || !el) return;

  if(isPrice) {
    el.innerText = "$" + (v < 1 ? v.toFixed(6) : v.toLocaleString());
    if(elV) elV.innerText = Math.round(v * RATE).toLocaleString("vi-VN") + " đ";
  }

  if(old[id]){
    if(v > old[id]) el.style.color = "#0ecb81";
    else if(v < old[id]) el.style.color = "#f6465d";
  }
  old[id] = v;
}

loadRate();
setInterval(loadRate, 60000);
setInterval(loadTokens, 2000);
setInterval(loadMarket, 3000);
loadTokens();
loadMarket();
</script>
</body>
</html>
