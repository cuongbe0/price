<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LIVE CRYPTO DASHBOARD</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#050816;
  color:white;
  font-family:Arial,sans-serif;
  overflow-y:auto;
}

.container{
  max-width:520px;
  margin:auto;
  padding:10px;
}

h1{
  text-align:center;
  font-size:28px;
  margin:14px 0 18px;
  font-weight:700;
}

.card{
  background:#10162b;
  border:1px solid #00ffe1;
  border-radius:18px;
  padding:16px;
  margin-bottom:12px;
  min-height:110px;

  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

.top{
  display:flex;
  align-items:center;
  gap:10px;
  margin-bottom:12px;
}

.logo{
  width:34px;
  height:34px;
  border-radius:50%;
  object-fit:cover;
  background:#fff;
}

.label{
  font-size:20px;
  font-weight:bold;
}

.price{
  font-size:34px;
  font-weight:bold;
  margin-bottom:8px;
}

.vnd{
  font-size:20px;
  color:#cfcfcf;
}

.green{
  color:#0ecb81;
}

.red{
  color:#f6465d;
}

@media(max-width:480px){

  h1{
    font-size:24px;
  }

  .card{
    min-height:95px;
    padding:14px;
  }

  .price{
    font-size:30px;
  }

  .vnd{
    font-size:18px;
  }

  .label{
    font-size:18px;
  }
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 LIVE CRYPTO DASHBOARD</h1>

<!-- TURBO -->
<div class="card">
  <div class="top">
    <img class="logo"
    src="https://turbo.miracledex.net/turbo-logo.png">
    <div class="label">TURBO</div>
  </div>

  <div id="turbo" class="price">...</div>
  <div id="turbo_vnd" class="vnd"></div>
</div>

<!-- PNIC -->
<div class="card">
  <div class="top">
    <img class="logo"
    src="https://coin-images.coingecko.com/coins/images/37667/small/IMG_20240506_181047_087.jpg?1715181260">
    <div class="label">PNIC</div>
  </div>

  <div id="pnic" class="price">...</div>
  <div id="pnic_vnd" class="vnd"></div>
</div>

<!-- BTC -->
<div class="card">
  <div class="top">
    <img class="logo"
    src="https://cryptologos.cc/logos/bitcoin-btc-logo.png?v=040">
    <div class="label">BTC</div>
  </div>

  <div id="btc" class="price">...</div>
  <div id="btc_vnd" class="vnd"></div>
</div>

<!-- ETH -->
<div class="card">
  <div class="top">
    <img class="logo"
    src="https://cryptologos.cc/logos/ethereum-eth-logo.png?v=040">
    <div class="label">ETH</div>
  </div>

  <div id="eth" class="price">...</div>
  <div id="eth_vnd" class="vnd"></div>
</div>

<!-- AVAX -->
<div class="card">
  <div class="top">
    <img class="logo"
    src="https://cryptologos.cc/logos/avalanche-avax-logo.png?v=040">
    <div class="label">AVAX</div>
  </div>

  <div id="avax" class="price">...</div>
  <div id="avax_vnd" class="vnd"></div>
</div>

</div>

<script>

let RATE = 26000;
let oldPrice = {};

async function loadRate(){

  try{

    const res = await fetch(
      'https://open.er-api.com/v6/latest/USD'
    );

    const data = await res.json();

    RATE = data.rates.VND;

  }catch(e){
    console.log(e);
  }
}

async function loadPNIC(){

  try{

    const res = await fetch(
      'https://mqeejpeekuzzygwabmnh.supabase.co/rest/v1/price_snapshots?select=*&order=timestamp.desc&limit=1',
      {
        headers:{
          apikey:'sb_publishable__EFtt8r3kAP6zwWT0Ze38w_zktfLWuv'
        }
      }
    );

    const data = await res.json();

    if(data && data.length){

      updatePrice(
        'pnic',
        data[0].pnic_price_usd
      );

      updatePrice(
        'turbo',
        data[0].turbo_price_usd
      );
    }

  }catch(e){
    console.log(e);
  }
}

async function loadMarket(){

  try{

    const res = await fetch(
      'https://min-api.cryptocompare.com/data/pricemulti?fsyms=BTC,ETH,AVAX&tsyms=USD'
    );

    const data = await res.json();

    updatePrice('btc', data.BTC.USD);
    updatePrice('eth', data.ETH.USD);
    updatePrice('avax', data.AVAX.USD);

  }catch(e){
    console.log(e);
  }
}

function updatePrice(id,value){

  const el = document.getElementById(id);
  const vnd = document.getElementById(id+'_vnd');

  if(!el || !vnd) return;

  value = Number(value);

  if(isNaN(value)) return;

  el.innerText =
    '$' + value.toLocaleString(
      'en-US',
      {
        minimumFractionDigits:6,
        maximumFractionDigits:6
      }
    );

  vnd.innerText =
    (value * RATE).toLocaleString('vi-VN')
    + ' đ';

  if(oldPrice[id]){

    el.classList.remove('green');
    el.classList.remove('red');

    if(value > oldPrice[id]){
      el.classList.add('green');
    }

    if(value < oldPrice[id]){
      el.classList.add('red');
    }
  }

  oldPrice[id] = value;
}

loadRate();
loadPNIC();
loadMarket();

setInterval(loadRate,60000);
setInterval(loadPNIC,4000);
setInterval(loadMarket,5000);

</script>

</body>
</html>
