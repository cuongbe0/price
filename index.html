<script>
    const API_KEY = "sb_publishable__EFtt8r3kAP6zwWT0Ze38w_zktfLWuv";
    const RATE_VND = 27050; 

    async function updateData() {
        try {
            const url = `https://mqeejpeekuzzygwabmnh.supabase.co/rest/v1/price_snapshots?select=*&order=timestamp.desc&limit=1`;
            const res = await fetch(url, {
                headers: { 
                    "apikey": API_KEY, 
                    "Authorization": "Bearer " + API_KEY,
                    "Content-Type": "application/json"
                }
            });
            const data = await res.json();
            
            if (data && data[0]) {
                const item = data[0];
                console.log("Dữ liệu gốc từ DB:", item);

                // Hàm tự động tìm cột theo từ khóa (Không lo sai tên cột)
                const find = (word) => {
                    const key = Object.keys(item).find(k => k.toLowerCase().includes(word.toLowerCase()));
                    return key ? item[key] : null;
                };

                // Lấy giá thực tế
                const m = find("mirx");
                const t = find("turbo");
                const p = find("pnic");
                const s = find("staked") || find("lp") || find("total");

                if(m) renderPrice("mirx", m, 6);
                if(t) renderPrice("turbo", t, 6);
                if(p) renderPrice("pnic", p, 6);
                if(s) renderStaked("lp", s);
            }
        } catch (e) {
            console.error("Lỗi kết nối Supabase:", e);
        }

        // Giá Market Quốc Tế (BTC, ETH, AVAX)
        try {
            const resM = await fetch("https://min-api.cryptocompare.com/data/pricemulti?fsyms=BTC,ETH,AVAX&tsyms=USD");
            const mData = await resM.json();
            if(mData.BTC) renderPrice("btc", mData.BTC.USD, 2);
            if(mData.ETH) renderPrice("eth", mData.ETH.USD, 2);
            if(mData.AVAX) renderPrice("avax", mData.AVAX.USD, 6);
        } catch (e) {}
    }

    function renderPrice(id, val, dec) {
        if (!val) return;
        const price = parseFloat(val);
        document.getElementById(id).innerText = "$" + price.toLocaleString('en-US', {minimumFractionDigits: dec, maximumFractionDigits: dec});
        document.getElementById(id + "_vnd").innerText = Math.round(price * RATE_VND).toLocaleString("vi-VN") + " VND";
    }

    function renderStaked(id, val) {
        if (!val) return;
        const num = parseFloat(val);
        document.getElementById(id).innerText = num.toLocaleString('en-US', {minimumFractionDigits: 2});
        document.getElementById(id + "_vnd").innerText = "LP TOKENS";
    }

    updateData();
    setInterval(updateData, 5000);
</script>
