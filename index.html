<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Crypto Dashboard Live</title>
    <style>
        body{background:#0b0e11; color:#fff; font-family:sans-serif; text-align:center; margin:0; padding:20px;}
        .row{display:flex; gap:15px; justify-content:center; flex-wrap:wrap; margin-bottom:20px;}
        .card{border:1px solid #2b3139; border-radius:12px; padding:20px; background:#161a1e; min-width:200px;}
        .price{font-size:28px; font-weight:bold; color:#00ffcc; margin:10px 0;}
        .label{color:#848e9c; font-size:14px; text-transform:uppercase;}
    </style>
</head>
<body>
    <h2 style="color:#00ffcc">🚀 LIVE CRYPTO DASHBOARD</h2>
    <div class="row">
        <div class="card"><div class="label">🌐 MIRX</div><div id="mirx" class="price">--</div></div>
        <div class="card"><div class="label">🚀 TURBO</div><div id="turbo" class="price">--</div></div>
        <div class="card"><div class="label">📊 TOTAL STAKED</div><div id="lp" class="price">--</div></div>
    </div>
    <div class="row">
        <div class="card"><div class="label">🟠 BTC</div><div id="btc" class="price">--</div></div>
        <div class="card"><div class="label">Ξ ETH</div><div id="eth" class="price">--</div></div>
    </div>

    <script>
        const K = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZGVoeGh3andnY3NlaHJxdm9xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NzY4MzgsImV4cCI6MjA5MzU1MjgzOH0.Rxx0IZYRRUUMPurhJqO6FdCS8O6t9NWrh_NfcU6onTY";
        const U = "https://zndehxhwjwgcsehrqvoq.supabase.co/rest/v1/price_snapshots";

        async function update() {
            try {
                const r = await fetch(U + "?select=*&order=timestamp.desc&limit=1", {
                    headers: { "apikey": K, "Authorization": "Bearer " + K }
                });
                const d = await r.json();
                if (d && d[0]) {
                    document.getElementById("mirx").innerText = "$" + d[0].mirx.toFixed(4);
                    document.getElementById("turbo").innerText = "$" + d[0].turbo.toFixed(4);
                    document.getElementById("lp").innerText = d[0].staked.toLocaleString();
                }
            } catch (e) { console.log("Supabase Error"); }

            try {
                const rM = await fetch("https://min-api.cryptocompare.com/data/pricemulti?fsyms=BTC,ETH&tsyms=USD");
                const m = await rM.json();
                document.getElementById("btc").innerText = "$" + m.BTC.USD.toLocaleString();
                document.getElementById("eth").innerText = "$" + m.ETH.USD.toLocaleString();
            } catch (e) {}
        }
        update(); setInterval(update, 5000);
    </script>
</body>
</html>
